<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Keluhan Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  margin:0;
}

header{
  background:#1b5e20;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
  padding:8px;
  width:100%;
  margin:5px 0;
}

button{
  background:#2e7d32;
  color:white;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#1b5e20;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

img{
  border-radius:5px;
}
</style>
</head>

<body>

<header>Sistem Keluhan Karyawan</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="nik" placeholder="Masukkan NIK">
<button id="btnLogin">Login</button>
</div>

<!-- FORM -->
<div class="card">
<h3>Kirim Laporan</h3>

<input id="judul" placeholder="Judul laporan">
<input id="buktiLink" placeholder="Link bukti (Google Drive / gambar)">

<label>
  <input type="checkbox" id="anonim"> Kirim sebagai anonim
</label>

<br><br>
<button id="btnKirim">Kirim</button>
</div>

<!-- DATA -->
<div class="card">
<h3>Data Laporan</h3>

<table>
<thead>
<tr>
  <th>Judul</th>
  <th>Status</th>
  <th>Bukti</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where,
  updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
   apiKey: "AIzaSyCfxTY0SNtQJBAz7yu8f_BDhZ3w_O244eE",
  authDomain: "keluahan-karyawan--ptbia.firebaseapp.com",
  projectId: "keluahan-karyawan--ptbia"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;

// LOGIN
document.getElementById("btnLogin").addEventListener("click", async () => {

  let nik = document.getElementById("nik").value.trim();

  const q = query(collection(db,"karyawan"), where("nik","==",nik));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("NIK tidak ditemukan");
    return;
  }

  snap.forEach(d=>{
    user = d.data();
    alert("Login berhasil: " + user.nama + " (" + user.role + ")");
  });

  load();
});

// KIRIM LAPORAN
document.getElementById("btnKirim").addEventListener("click", async () => {

  if(!user){
    alert("Login dulu");
    return;
  }

  let judulInput = document.getElementById("judul").value.trim();
  let buktiLink = document.getElementById("buktiLink").value.trim();
  let anonim = document.getElementById("anonim").checked;

  if(!judulInput){
    alert("Judul tidak boleh kosong");
    return;
  }

  await addDoc(collection(db,"laporan"),{
    nik: anonim ? "-" : user.nik,
    nama: anonim ? "Anonim" : user.nama,
    departemen: anonim ? "-" : user.departemen,
    judul: judulInput,
    bukti: buktiLink,
    status: "Menunggu HR"
  });

  alert("Laporan terkirim");
  load();
});

// WARNA STATUS
function warnaStatus(status){
  if(status==="Menunggu HR") return "orange";
  if(status==="HR Approved") return "blue";
  if(status==="Manager Approved") return "purple";
  if(status==="Selesai") return "green";
  return "black";
}

// LOAD DATA
async function load(){
  const snap = await getDocs(collection(db,"laporan"));
  let html="";

  snap.forEach(d=>{
    let x=d.data();

    // FILTER ROLE
    if(user.role==="karyawan" && x.nik!==user.nik) return;
    if(user.role==="manager" && x.departemen!==user.departemen) return;

    html+=`
    <tr>
      <td>${x.judul}</td>

      <td style="color:${warnaStatus(x.status)}">
        ${x.status}
      </td>

      <td>
        ${
          x.bukti 
          ? `<img src="${x.bukti}" width="80">` 
          : "-"
        }
      </td>

      <td>
        ${user.role==="hr" ? `<button onclick="approveHR('${d.id}')">HR</button>` : ""}
        ${user.role==="manager" ? `<button onclick="approveManager('${d.id}')">Manager</button>` : ""}
        ${(user.role==="hr" || user.role==="manager") ? `<button onclick="selesai('${d.id}')">Selesai</button>` : ""}
      </td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML=html;
}

// APPROVAL
window.approveHR = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"HR Approved"});
  load();
}

window.approveManager = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Manager Approved"});
  load();
}

window.selesai = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Selesai"});
  load();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Keluhan Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#0d47a1;
  --secondary:#1565c0;
  --dark:#0a192f;
  --bg:#0f172a;
  --card:#ffffff;
}

/* BODY */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
}

/* LAYOUT */
.wrapper{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:var(--dark);
  color:white;
  padding:20px;
}

.logo{display:flex;gap:10px;margin-bottom:20px}
.logo img{height:40px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{
  background:#0b2447;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* CONTENT */
.content{padding:20px;overflow:auto}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  margin-bottom:15px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--secondary);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px rgba(21,101,192,0.5);
}

button:hover{
  background:var(--primary);
}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{background:var(--secondary);color:white}
th,td{padding:10px;border:1px solid #ddd;text-align:center}

tr:hover{background:#f1f5f9}

/* STATUS */
.menunggu{color:orange}
.selesai{color:green}
</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    <b>PT BIA</b>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <b>Sistem Keluhan</b>
  <div id="userInfo">Belum login</div>
</div>

<div class="content">

<div class="card">
<h3>Login</h3>
<input id="nik" placeholder="Masukkan NIK">
<input id="password" type="password" placeholder="Tanggal Lahir (DDMMYYYY)">
<button id="btnLogin">Login</button>
</div>

<div class="card">
<h3>Data Laporan</h3>

<table>
<thead>
<tr>
<th>Judul</th>
<th>Status</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  query, where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
authDomain: "ISI_PROJECT.firebaseapp.com",
projectId: "ISI_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user=null;

/* LOGIN */
document.getElementById("btnLogin").onclick = async () => {

  let nikInput = document.getElementById("nik").value.trim();
  let passInput = document.getElementById("password").value.trim();

  if(passInput.length !== 8){
    alert("Format password DDMMYYYY");
    return;
  }

  const q = query(collection(db,"karyawan"), where("nik","==",nikInput));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("NIK tidak ditemukan");
    return;
  }

  let found = false;

  snap.forEach(d=>{
    let data = d.data();

    if(data.tgl_lahir === passInput){
      user = data;
      found = true;
    }
  });

  if(!found){
    alert("Password salah");
    return;
  }

  document.getElementById("userInfo").innerText =
    user.nama + " (" + user.role + ")";

  alert("Login berhasil");
  load();
};

/* LOAD DATA */
async function load(){
  const snap = await getDocs(collection(db,"laporan"));
  let html="";

  snap.forEach(d=>{
    let x = d.data();

    // filter berdasarkan role
    if(user.role==="karyawan" && x.nik!==user.nik) return;
    if(user.role==="manager" && x.departemen!==user.departemen) return;

    html+=`
    <tr>
      <td>${x.judul}</td>
      <td class="${x.status==='Selesai'?'selesai':'menunggu'}">${x.status}</td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

</script>

</body>
</html>

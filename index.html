<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Karyawan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #ffffff;
      width: 360px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #cccccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1b5e20;
    }

    #error {
      margin-top: 15px;
      text-align: center;
      color: red;
      font-size: 14px;
    }

    #success {
      margin-top: 15px;
      text-align: center;
      color: green;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login Karyawan</h2>

  <form id="loginForm">
    <input
      type="text"
      id="nik"
      placeholder="Masukkan NIK"
      required
    >

    <input
      type="date"
      id="dob"
      required
    >

    <button type="submit">
      Login
    </button>

    <p id="error"></p>
    <p id="success"></p>
  </form>
</div>

<script type="module">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfxTY0SNtQJBAz7yu8f_BDhZ3w_O244eE",
  authDomain: "keluahan-karyawan--ptbia.firebaseapp.com",
  databaseURL: "https://keluahan-karyawan--ptbia-default-rtdb.firebaseio.com",
  projectId: "keluahan-karyawan--ptbia",
  storageBucket: "keluahan-karyawan--ptbia.firebasestorage.app",
  messagingSenderId: "855781665617",
  appId: "1:855781665617:web:c7a6a34bd1e2eca0ef0170"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const nik = document.getElementById("nik").value.trim();
  const dobInput = document.getElementById("dob").value;

  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.textContent = "";
  success.textContent = "";

  // ubah dari YYYY-MM-DD → DD/MM/YYYY
  const parts = dobInput.split("-");
  const dobFormatted = `${parts[2]}/${parts[1]}/${parts[0]}`;

  try {
    const snapshot = await get(ref(db, "karyawan/" + nik));

    if (!snapshot.exists()) {
      error.textContent = "NIK tidak ditemukan";
      return;
    }

    const user = snapshot.val();

    if (!user.tgl_lahir) {
      error.textContent = "Tanggal lahir tidak ada di database";
      return;
    }

    if (user.tgl_lahir === dobFormatted) {
      localStorage.setItem("user", JSON.stringify(user));

      success.textContent = "Login berhasil...";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    } else {
      error.textContent = "Tanggal lahir salah";
    }

  } catch (err) {
    console.log(err);
    error.textContent = "Gagal koneksi Firebase";
  }
});

</script>

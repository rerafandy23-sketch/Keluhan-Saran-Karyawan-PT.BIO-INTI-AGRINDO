<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Keluhan Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
button{background:green;color:white;padding:8px;border:none}
input{padding:8px;width:100%;margin:5px 0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:8px;text-align:left}
</style>
</head>

<body>

<div class="card">
<h3>Login</h3>
<input id="nik" placeholder="Masukkan NIK">
<button id="btnLogin">Login</button>
</div>

<div class="card">
<h3>Kirim Laporan</h3>
<input id="judul" placeholder="Judul">
<input id="buktiLink" placeholder="Link bukti (Google Drive)">
<button id="btnKirim">Kirim</button>
</div>

<table>
<thead>
<tr>
  <th>Judul</th>
  <th>Status</th>
  <th>Bukti</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where,
  updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfxTY0SNtQJBAz7yu8f_BDhZ3w_O244eE",
  authDomain: "keluahan-karyawan--ptbia.firebaseapp.com",
  projectId: "keluahan-karyawan--ptbia"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;

// LOGIN
document.getElementById("btnLogin").addEventListener("click", async () => {

  let nik = document.getElementById("nik").value.trim();

  const q = query(collection(db,"karyawan"), where("nik","==",nik));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("NIK tidak ditemukan");
    return;
  }

  snap.forEach(d=>{
    user = d.data();
    alert("Login berhasil: " + user.nama + " (" + user.role + ")");
  });

  load();
});

// KIRIM LAPORAN
document.getElementById("btnKirim").addEventListener("click", async () => {

  if(!user){
    alert("Login dulu");
    return;
  }

  let judulInput = document.getElementById("judul").value.trim();
  let buktiLink = document.getElementById("buktiLink").value;

  if(!judulInput){
    alert("Judul tidak boleh kosong");
    return;
  }

  await addDoc(collection(db,"laporan"),{
    nik: user.nik,
    nama: user.nama,
    departemen: user.departemen,
    judul: judulInput,
    bukti: buktiLink,
    status: "Menunggu HR"
  });

  alert("Laporan terkirim");
  load();
});

// LOAD DATA + FILTER ROLE
async function load(){
  const snap = await getDocs(collection(db,"laporan"));
  let html="";

  snap.forEach(d=>{
    let x=d.data();

    // 🔐 FILTER ROLE
    if(user.role === "karyawan" && x.nik !== user.nik) return;
    if(user.role === "manager" && x.departemen !== user.departemen) return;
    // HR lihat semua

    html+=`
    <tr>
      <td>${x.judul}</td>
      <td>${x.status}</td>
      <td>
        ${x.bukti ? `<a href="${x.bukti}" target="_blank">Lihat</a>` : "-"}
      </td>
      <td>
        <button onclick="approveHR('${d.id}')">HR</button>
        <button onclick="approveManager('${d.id}')">Manager</button>
        <button onclick="selesai('${d.id}')">Selesai</button>
      </td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML=html;
}

// APPROVAL
window.approveHR = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"HR Approved"});
  load();
}

window.approveManager = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Manager Approved"});
  load();
}

window.selesai = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Selesai"});
  load();
}

</script>

</body>
</html>

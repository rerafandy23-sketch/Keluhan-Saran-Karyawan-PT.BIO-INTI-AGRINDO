<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, where 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCfxTY0SNtQJBAz7yu8f_BDhZ3w_O244eE",
  authDomain: "keluahan-karyawan--ptbia.firebaseapp.com",
  projectId: "keluahan-karyawan--ptbia",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;

// ✅ LOGIN
window.login = async function(){
  let nikInput = document.getElementById("nik").value;

  const q = query(collection(db, "karyawan"), where("nik", "==", nikInput));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("❌ NIK tidak ditemukan");
    return;
  }

  snap.forEach(d=>{
    user = d.data();
    alert("✅ Login: " + user.nama);
  });

  load();
}

// ✅ KIRIM LAPORAN
window.kirim = async function(){

  if(!user){
    alert("Login dulu");
    return;
  }

  await addDoc(collection(db, "laporan"), {
    nik: user.nik,
    nama: user.nama,
    departemen: user.departemen,
    judul: document.getElementById("judul").value,
    status: "Menunggu HRD"
  });

  alert("Laporan berhasil dikirim");
  load();
}

// ✅ LOAD DATA
async function load(){
  const snap = await getDocs(collection(db,"laporan"));
  let html = "";
  let selesai = 0;

  snap.forEach(d=>{
    let x = d.data();

    if(user.role==="karyawan" && x.nik!==user.nik) return;
    if(user.role==="manager" && x.departemen!==user.departemen) return;

    if(x.status==="Selesai") selesai++;

    html += `
      <tr>
        <td>${x.judul}</td>
        <td>${x.departemen}</td>
        <td>${x.status}</td>
        <td>
          <button onclick="approveHR('${d.id}')">HR</button>
          <button onclick="approveManager('${d.id}')">Manager</button>
          <button onclick='selesai("${d.id}",${JSON.stringify(x)})'>Selesai</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Total","Selesai"],
      datasets:[{data:[snap.size,selesai]}]
    }
  });
}

// ✅ APPROVAL
window.approveHR = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"HR Approved"});
  load();
}

window.approveManager = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Manager Approved"});
  load();
}

// ✅ SELESAI + PDF
window.selesai = async function(id,data){
  await updateDoc(doc(db,"laporan",id),{status:"Selesai"});

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  pdf.text("PT. BIO INTI AGRINDO",10,10);
  pdf.text("BAP PENYELESAIAN",10,20);
  pdf.text("Judul: "+data.judul,10,30);
  pdf.save("BAP.pdf");

  alert("Selesai + BAP dibuat");
  load();
}

</script>

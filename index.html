<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Keluhan Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
button{background:green;color:white;padding:8px;border:none}
input{padding:8px;width:100%;margin:5px 0}
</style>
</head>

<body>

<div class="card">
<h3>Login</h3>
<input id="nik" placeholder="Masukkan NIK">
<button id="btnLogin">Login</button>
</div>

<div class="card">
<h3>Kirim Laporan</h3>
<input id="judul" placeholder="Judul">
<button id="btnKirim">Kirim</button>
</div>

<table border="1">
<tbody id="data"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfxTY0SNtQJBAz7yu8f_BDhZ3w_O244eE",
  authDomain: "keluahan-karyawan--ptbia.firebaseapp.com",
  projectId: "keluahan-karyawan--ptbia",
  storageBucket: "keluahan-karyawan--ptbia.firebasestorage.app",
  messagingSenderId: "855781665617",
  appId: "1:855781665617:web:c7a6a34bd1e2eca0ef0170",
  measurementId: "G-2V50ZE9G6E"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;

// 🔥 FIX BUTTON CLICK
document.getElementById("btnLogin").addEventListener("click", async () => {

  let nik = document.getElementById("nik").value.trim();
  console.log("Klik login:", nik);

  const q = query(collection(db,"karyawan"), where("nik","==",nik));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("NIK tidak ditemukan");
    return;
  }

  snap.forEach(d=>{
    user = d.data();
    alert("Login berhasil: " + user.nama);
  });

  load();
});

document.getElementById("btnKirim").addEventListener("click", async () => {

  if(!user){
    alert("Login dulu");
    return;
  }

  await addDoc(collection(db,"laporan"),{
    nik:user.nik,
    nama:user.nama,
    judul:document.getElementById("judul").value,
    status:"Menunggu"
  });

  alert("Laporan terkirim");
  load();
});

async function load(){
  const snap = await getDocs(collection(db,"laporan"));
  let html="";

  snap.forEach(d=>{
    let x=d.data();
    html+=`<tr><td>${x.judul}</td><td>${x.status}</td></tr>`;
  });

  document.getElementById("data").innerHTML=html;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Keluhan Karyawan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#1b5e20;
  --secondary:#2e7d32;
  --bg:#eef2f7;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

/* HEADER */
header{
  background:var(--primary);
  color:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{height:40px}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  background:var(--secondary);
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{background:var(--primary)}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.box{
  background:#f5f5f5;
  padding:10px;
  text-align:center;
  border-radius:8px;
}

.box h2{margin:0;color:var(--primary)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{background:var(--secondary);color:white}
th,td{padding:8px;border:1px solid #ddd;text-align:center}

/* STATUS */
.menunggu{color:orange}
.hr{color:blue}
.manager{color:purple}
.selesai{color:green}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="logo.png" class="logo">
    <b>PT. Bio Inti Agrindo</b>
  </div>
  <div id="userInfo">Belum login</div>
</header>

<div class="container">

<!-- LEFT -->
<div>

<div class="card">
<h3>Login</h3>
<input id="nik" placeholder="Masukkan NIK">
<button id="btnLogin">Login</button>
</div>

<div class="card">
<h3>Kirim Laporan</h3>

<input id="judul" placeholder="Judul">
<input id="buktiLink" placeholder="Link bukti">

<label><input type="radio" name="mode" value="anonim" checked> Anonim</label>
<label><input type="radio" name="mode" value="identitas"> Identitas</label>

<div id="identitasBox" style="display:none;">
  <input id="namaInput" placeholder="Nama">
  <input id="jabatanInput" placeholder="Jabatan">
</div>

<button id="btnKirim">Kirim</button>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<h3>Dashboard</h3>

<div class="kpi">
  <div class="box"><h2 id="total">0</h2>Total</div>
  <div class="box"><h2 id="menunggu">0</h2>Menunggu</div>
  <div class="box"><h2 id="proses">0</h2>Proses</div>
  <div class="box"><h2 id="selesai">0</h2>Selesai</div>
</div>

<canvas id="chart"></canvas>

<select id="filterStatus">
<option value="">Semua</option>
<option>Menunggu HR</option>
<option>HR Approved</option>
<option>Manager Approved</option>
<option>Selesai</option>
</select>

</div>

<div class="card">
<h3>Data Laporan</h3>

<table>
<thead>
<tr>
<th>Judul</th>
<th>Nama</th>
<th>Jabatan</th>
<th>Status</th>
<th>Bukti</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
authDomain: "ISI_PROJECT.firebaseapp.com",
projectId: "ISI_PROJECT"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user=null;
let chart=null;

/* TOGGLE */
document.querySelectorAll('input[name="mode"]').forEach(r=>{
  r.onchange=()=>{
    identitasBox.style.display =
      document.querySelector('input[name="mode"]:checked').value==="identitas"
      ?"block":"none";
  }
});

/* LOGIN */
btnLogin.onclick=async()=>{
  let nik=nik.value.trim();

  const q=query(collection(db,"karyawan"), where("nik","==",nik));
  const snap=await getDocs(q);

  if(snap.empty) return alert("NIK tidak ditemukan");

  snap.forEach(d=>user=d.data());

  userInfo.innerText=user.nama+" ("+user.role+")";
  load();
};

/* KIRIM */
btnKirim.onclick=async()=>{
  if(!user) return alert("Login dulu");

  let judul=judul.value.trim();
  let bukti=buktiLink.value.trim();
  let mode=document.querySelector('input[name="mode"]:checked').value;

  if(!judul) return alert("Judul wajib");

  let data={
    judul,
    bukti,
    status:"Menunggu HR"
  };

  if(mode==="anonim"){
    data.nama="Anonim";
    data.jabatan="-";
    data.nik="-";
    data.departemen="-";
  }else{
    data.nama=namaInput.value||user.nama;
    data.jabatan=jabatanInput.value||user.jabatan;
    data.nik=user.nik;
    data.departemen=user.departemen;
  }

  await addDoc(collection(db,"laporan"),data);
  alert("Terkirim");
  load();
};

/* LOAD */
async function load(){
  const snap=await getDocs(collection(db,"laporan"));

  let html="";
  let total=0,menunggu=0,proses=0,selesai=0;
  let filter=filterStatus.value;

  snap.forEach(d=>{
    let x=d.data();

    if(user.role==="karyawan" && x.nik!==user.nik) return;
    if(user.role==="manager" && x.departemen!==user.departemen) return;
    if(filter && x.status!==filter) return;

    total++;
    if(x.status==="Menunggu HR") menunggu++;
    if(x.status!=="Menunggu HR" && x.status!=="Selesai") proses++;
    if(x.status==="Selesai") selesai++;

    let warna="";
    if(x.status==="Menunggu HR") warna="menunggu";
    if(x.status==="HR Approved") warna="hr";
    if(x.status==="Manager Approved") warna="manager";
    if(x.status==="Selesai") warna="selesai";

    html+=`
    <tr>
      <td>${x.judul}</td>
      <td>${x.nama}</td>
      <td>${x.jabatan}</td>
      <td class="${warna}">${x.status}</td>
      <td>${x.bukti?`<img src="${x.bukti}" width="70">`:"-"}</td>
      <td>
        ${user.role==="hr"?`<button onclick="approveHR('${d.id}')">HR</button>`:""}
        ${user.role==="manager"?`<button onclick="approveManager('${d.id}')">Manager</button>`:""}
        ${(user.role==="hr"||user.role==="manager")?`<button onclick="selesai('${d.id}')">✔</button>`:""}
      </td>
    </tr>`;
  });

  data.innerHTML=html;

  totalEl.innerText=total;
  menungguEl.innerText=menunggu;
  prosesEl.innerText=proses;
  selesaiEl.innerText=selesai;

  if(chart) chart.destroy();

  chart=new Chart(chartCanvas,{
    type:"bar",
    data:{
      labels:["Total","Menunggu","Proses","Selesai"],
      datasets:[{data:[total,menunggu,proses,selesai]}]
    }
  });
}

/* FILTER */
filterStatus.onchange=load;

/* ACTION */
window.approveHR=async id=>{
  await updateDoc(doc(db,"laporan",id),{status:"HR Approved"});
  load();
};

window.approveManager=async id=>{
  await updateDoc(doc(db,"laporan",id),{status:"Manager Approved"});
  load();
};

window.selesai=async id=>{
  await updateDoc(doc(db,"laporan",id),{status:"Selesai"});
  load();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Karyawan</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }

    #error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login Karyawan</h2>

  <form id="loginForm">
    <input type="text" id="nik" placeholder="Masukkan NIK" required>

    <input type="date" id="dob" required>

    <button type="submit">Login</button>

    <p id="error"></p>
  </form>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nik = document.getElementById("nik").value;
    const dob = document.getElementById("dob").value;
    const error = document.getElementById("error");

    error.textContent = "";

    try {
      const snapshot = await get(ref(db, "karyawan/" + nik));

      if (!snapshot.exists()) {
        error.textContent = "NIK tidak ditemukan";
        return;
      }

      const data = snapshot.val();

      if (data.tanggalLahir === dob) {
        // login sukses
        localStorage.setItem("user", JSON.stringify(data));
        window.location.href = "dashboard.html";
      } else {
        error.textContent = "Tanggal lahir salah";
      }

    } catch (err) {
      error.textContent = "Terjadi kesalahan sistem";
      console.log(err);
    }
  });
</script>

</body>
</html>

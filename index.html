<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Karyawan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #ffffff;
      width: 350px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #cccccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-box button:hover {
      background: #1b5e20;
    }

    #error {
      margin-top: 15px;
      text-align: center;
      color: red;
      font-size: 14px;
    }

    #success {
      margin-top: 15px;
      text-align: center;
      color: green;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login Karyawan</h2>

    <form id="loginForm">
      <input 
        type="text" 
        id="nik" 
        placeholder="Masukkan NIK" 
        required
      >

      <input 
        type="date" 
        id="dob" 
        required
      >

      <button type="submit">
        Login
      </button>

      <p id="error"></p>
      <p id="success"></p>
    </form>
  </div>

  <!-- FIREBASE SCRIPT -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    /*
    ==========================================
    GANTI DENGAN FIREBASE CONFIG ASLI KAMU
    ==========================================
    */
const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
authDomain: "ISI_PROJECT.firebaseapp.com",
projectId: "ISI_PROJECT"
};

  

    /*
    ==========================================
    INISIALISASI FIREBASE
    ==========================================
    */

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    /*
    ==========================================
    LOGIN DENGAN NIK + TANGGAL LAHIR
    ==========================================
    */

    document
      .getElementById("loginForm")
      .addEventListener("submit", async function (e) {

        e.preventDefault();

        const nik = document.getElementById("nik").value.trim();
        const dob = document.getElementById("dob").value;

        const error = document.getElementById("error");
        const success = document.getElementById("success");

        error.textContent = "";
        success.textContent = "";

        console.log("LOGIN ATTEMPT:", nik, dob);

        try {
          // ambil data dari Firebase
          const snapshot = await get(
            ref(db, "karyawan/" + nik)
          );

          // cek apakah NIK ada
          if (!snapshot.exists()) {
            error.textContent = "NIK tidak ditemukan";
            return;
          }

          const user = snapshot.val();

          console.log("DATA USER:", user);

          // cek apakah tanggal lahir ada
          if (!user.tanggalLahir) {
            error.textContent = "Tanggal lahir tidak ada di database";
            return;
          }

          // validasi tanggal lahir
          if (user.tanggalLahir === dob) {

            // simpan session login
            localStorage.setItem(
              "user",
              JSON.stringify(user)
            );

            success.textContent = "Login berhasil...";

            // redirect ke dashboard lama kamu
            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 1000);

          } else {
            error.textContent = "Tanggal lahir salah";
          }

        } catch (err) {
          console.log("FIREBASE ERROR:", err);
          error.textContent = "Gagal koneksi ke Firebase";
        }
      });

  </script>

</body>
</html>

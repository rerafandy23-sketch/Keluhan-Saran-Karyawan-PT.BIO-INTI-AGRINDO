<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Complaint System - Premium Responsive</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fa;
      color: #222;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: #0f172a;
      color: white;
      padding: 24px;
      position: fixed;
      height: 100%;
      left: 0;
      top: 0;
      transition: 0.3s;
      z-index: 1000;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 22px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 14px 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .sidebar ul li:hover {
      background: rgba(255,255,255,0.1);
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
    }

    .sidebar a:hover {
      color: white;
    }

    /* MAIN */
    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 24px;
      transition: 0.3s;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .menu-btn {
      display: none;
      font-size: 28px;
      cursor: pointer;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .card h3 {
      font-size: 15px;
      color: #666;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
    }

    /* TABLE */
    .table-box {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-edit {
      background: #2563eb;
      color: white;
    }

    .btn-close {
      background: #16a34a;
      color: white;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .sidebar {
        left: -100%;
      }

      .sidebar.active {
        left: 0;
      }

      .main {
        margin-left: 0;
        width: 100%;
      }

      .menu-btn {
        display: block;
      }

      .topbar h1 {
        font-size: 20px;
      }

      .card p {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h2>HR System</h2>
    <ul>
      <li><a href="./index.html">Dashboard</a></li>
      <li><a href="./employee-complaint.html">Employee Complaint</a></li>
      <li><a href="#">Follow Up</a></li>
      <li><a href="./case-close.html">Case Close</a></li>
      <li><a href="#">Reports</a></li>
      <li><a href="#">Settings</a></li>
      <li><a href="#">Logout</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="menu-btn" onclick="toggleSidebar()">☰</div>
      <h1>Dashboard HR Complaint</h1>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Total Complaint</h3>
      <p id="totalComplaint">0</p>
      </div>

      <div class="card">
        <h3>Open Case</h3>
       <p id="openCase">0</p>
      </div>

      <div class="card">
        <h3>In Progress</h3>
      <p id="progressCase">0</p>
      </div>

      <div class="card">
        <h3>Closed Case</h3>
       <p id="closedCase">0</p>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>Departemen</th>
            <th>Keluhan</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>

    <tbody id="complaintTable">

        </tbody>
      </table>
    </div>
  </div>
</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCy9-XeYCtRIizGgReyiFmfEY6wj7kbKl4",
    authDomain: "hr-complaint-system-dc65e.firebaseapp.com",
    projectId: "hr-complaint-system-dc65e",
    storageBucket: "hr-complaint-system-dc65e.firebasestorage.app",
    messagingSenderId: "687763805360",
    appId: "1:687763805360:web:b914603af7c1057ce69775"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadComplaints() {
 const table = document.getElementById("complaintTable");
  table.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "complaints"));

  let nomor = 1;
  let total = 0;
  let open = 0;
  let progress = 0;
  let closed = 0;

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    total++;

    if (data.status === "Open") {
      open++;
    } else if (data.status === "Progress") {
      progress++;
    } else if (data.status === "Closed") {
      closed++;
    }

    table.innerHTML += `
      <tr>
        <td>#${nomor++}</td>
        <td>${data.nama || "-"}</td>
        <td>${data.departemen || "-"}</td>
        <td>${data.jenis || "-"}</td>
        <td>${data.status || "Open"}</td>
        <td>
          <button class="btn btn-edit">Edit</button>
          <a href="./case-close.html?id=${doc.id}">
            <button class="btn btn-close">Close</button>
          </a>
        </td>
      </tr>
    `;
  });

  document.getElementById("totalComplaint").innerText = total;
  document.getElementById("openCase").innerText = open;
  document.getElementById("progressCase").innerText = progress;
  document.getElementById("closedCase").innerText = closed;
}
loadComplaints();
  function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
  }

  window.toggleSidebar = toggleSidebar;
</script>
</body>
</html>

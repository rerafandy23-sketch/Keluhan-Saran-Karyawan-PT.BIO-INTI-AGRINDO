<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Keluhan Karyawan</title>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  margin:0;
}

header{
  background:#1b5e20;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container{padding:20px;}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
  padding:8px;
  width:100%;
  margin:5px 0;
}

button{
  background:#2e7d32;
  color:white;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{background:#1b5e20;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

img{
  border-radius:5px;
}
</style>
</head>

<body>

<header>Sistem Keluhan Karyawan</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="nik" placeholder="Masukkan NIK">
<button id="btnLogin">Login</button>
</div>

<!-- FORM -->
<div class="card">
<h3>Kirim Laporan</h3>

<input id="judul" placeholder="Judul laporan">
<input id="buktiLink" placeholder="Link bukti (Google Drive / gambar)">

<!-- PILIHAN -->
<label>
  <input type="radio" name="mode" value="anonim" checked> Kirim sebagai Anonim
</label>

<label>
  <input type="radio" name="mode" value="identitas"> Tampilkan Identitas
</label>

<!-- IDENTITAS -->
<div id="identitasBox" style="display:none;">
  <input id="namaInput" placeholder="Nama (opsional)">
  <input id="jabatanInput" placeholder="Jabatan (opsional)">
</div>

<br>
<button id="btnKirim">Kirim</button>
</div>

<!-- DATA -->
<div class="card">
<h3>Data Laporan</h3>

<table>
<thead>
<tr>
  <th>Judul</th>
  <th>Nama</th>
  <th>Jabatan</th>
  <th>Status</th>
  <th>Bukti</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where,
  updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
authDomain: "ISI_PROJECT.firebaseapp.com",
projectId: "ISI_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;

// TOGGLE IDENTITAS
document.querySelectorAll('input[name="mode"]').forEach(radio=>{
  radio.addEventListener("change", ()=>{
    let mode = document.querySelector('input[name="mode"]:checked').value;

    document.getElementById("identitasBox").style.display =
      mode==="identitas" ? "block" : "none";
  });
});

// LOGIN
document.getElementById("btnLogin").addEventListener("click", async () => {

  let nik = document.getElementById("nik").value.trim();

  const q = query(collection(db,"karyawan"), where("nik","==",nik));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("NIK tidak ditemukan");
    return;
  }

  snap.forEach(d=>{
    user = d.data();
    alert("Login: " + user.nama + " (" + user.role + ")");
  });

  load();
});

// KIRIM
document.getElementById("btnKirim").addEventListener("click", async () => {

  if(!user){
    alert("Login dulu");
    return;
  }

  let judulInput = document.getElementById("judul").value.trim();
  let buktiLink = document.getElementById("buktiLink").value.trim();
  let mode = document.querySelector('input[name="mode"]:checked').value;

  if(!judulInput){
    alert("Judul wajib diisi");
    return;
  }

  let data = {
    judul: judulInput,
    bukti: buktiLink,
    status: "Menunggu HR"
  };

  if(mode==="anonim"){
    data.nama = "Anonim";
    data.jabatan = "-";
    data.nik = "-";
    data.departemen = "-";
  } else {
    data.nama = document.getElementById("namaInput").value || user.nama;
    data.jabatan = document.getElementById("jabatanInput").value || user.jabatan;
    data.nik = user.nik;
    data.departemen = user.departemen;
  }

  await addDoc(collection(db,"laporan"), data);

  alert("Laporan terkirim");
  load();
});

// WARNA STATUS
function warna(status){
  if(status==="Menunggu HR") return "orange";
  if(status==="HR Approved") return "blue";
  if(status==="Manager Approved") return "purple";
  if(status==="Selesai") return "green";
  return "black";
}

// LOAD DATA
async function load(){
  const snap = await getDocs(collection(db,"laporan"));
  let html="";

  snap.forEach(d=>{
    let x=d.data();

    if(user.role==="karyawan" && x.nik!==user.nik) return;
    if(user.role==="manager" && x.departemen!==user.departemen) return;

    html+=`
    <tr>
      <td>${x.judul}</td>
      <td>${x.nama}</td>
      <td>${x.jabatan}</td>
      <td style="color:${warna(x.status)}">${x.status}</td>
      <td>${x.bukti ? `<img src="${x.bukti}" width="80">` : "-"}</td>
      <td>
        ${user.role==="hr" ? `<button onclick="approveHR('${d.id}')">HR</button>` : ""}
        ${user.role==="manager" ? `<button onclick="approveManager('${d.id}')">Manager</button>` : ""}
        ${(user.role==="hr" || user.role==="manager") ? `<button onclick="selesai('${d.id}')">Selesai</button>` : ""}
      </td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML=html;
}

// APPROVAL
window.approveHR = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"HR Approved"});
  load();
}

window.approveManager = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Manager Approved"});
  load();
}

window.selesai = async function(id){
  await updateDoc(doc(db,"laporan",id),{status:"Selesai"});
  load();
}

</script>

</body>
</html>

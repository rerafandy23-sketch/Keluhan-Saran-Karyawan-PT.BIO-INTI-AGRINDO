<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Final Keluhan Karyawan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1e293b;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }

    h1 {
      font-size: 30px;
      color: #0f4c81;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      color: #0f4c81;
      margin-bottom: 16px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      font-size: 14px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div>
      <h1>Dashboard Final Keluhan Karyawan</h1>
      <p class="subtitle">Sistem pengaduan internal PT BIO INTI AGRINDO</p>
    </div>
    <button class="btn btn-secondary" onclick="logoutEmployee()">Logout</button>
  </div>

  <div class="card">
    <h2>Informasi Karyawan</h2>
    <p><strong>Nama:</strong> <span id="employeeNama">-</span></p>
    <p><strong>NIK:</strong> <span id="employeeNik">-</span></p>
    <p><strong>Jabatan:</strong> <span id="employeeJabatan">-</span></p>
    <p><strong>Departemen:</strong> <span id="employeeDepartemen">-</span></p>
  </div>

  <div class="card">
    <h2>Kirim Keluhan Baru</h2>

    <div class="form-group">
      <label>Jenis Keluhan</label>
      <select id="jenis">
        <option>Pilih Jenis Keluhan</option>
        <option>Bullying</option>
        <option>Pelecehan</option>
        <option>Diskriminasi</option>
        <option>Masalah Payroll</option>
        <option>Absensi</option>
        <option>Penyalahgunaan Wewenang</option>
        <option>Fraud Internal</option>
        <option>Lainnya</option>
      </select>
    </div>

    <div class="form-group">
      <label>Detail Keluhan</label>
      <textarea id="detail" placeholder="Tuliskan detail keluhan..."></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="submitComplaint()">Kirim Keluhan</button>
      <button class="btn btn-secondary" onclick="location.reload()">Reset</button>
    </div>
  </div>

  <div class="card">
    <h2>Daftar Keluhan Saya</h2>
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>ID Kasus</th>
          <th>Jenis</th>
          <th>Status</th>
          <th>Tahap Approval</th>
          <th>Feedback</th>
        </tr>
      </thead>
      <tbody id="trackingTableBody">
        <tr>
          <td colspan="6">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
document.getElementById('employeeNama').innerText = localStorage.getItem('employee_nama') || '-';
document.getElementById('employeeNik').innerText = localStorage.getItem('employee_nik') || '-';
document.getElementById('employeeJabatan').innerText = localStorage.getItem('employee_jabatan') || '-';
document.getElementById('employeeDepartemen').innerText = localStorage.getItem('employee_departemen') || '-';

function logoutEmployee() {
  const ok = confirm('Yakin ingin logout?');
  if (!ok) return;

  localStorage.removeItem('employee_nik');
  localStorage.removeItem('employee_nama');
  localStorage.removeItem('employee_jabatan');
  localStorage.removeItem('employee_departemen');
  localStorage.removeItem('employee_role');

  window.location.href = './employee-login.html';
}

function submitComplaint() {
  alert('Versi final siap. Berikutnya tinggal sambungkan penuh ke Firebase.');
}
</script>

</body>
</html>

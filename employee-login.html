<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Karyawan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #0f4c81;
    }

    p {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1e88e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h1>Login Karyawan</h1>
  <p>Masuk menggunakan NIK dan tanggal lahir</p>

  <label>NIK</label>
  <input type="text" id="nik" placeholder="Masukkan NIK">

  <label>Password (Tanggal Lahir)</label>
  <input type="password" id="password" placeholder="Contoh: 25/04/1998">

  <button onclick="loginEmployee()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy9-XeYCtRIizGgReyiFmfEY6wj7kbKl4",
  authDomain: "hr-complaint-system-dc65e.firebaseapp.com",
  projectId: "hr-complaint-system-dc65e",
  storageBucket: "hr-complaint-system-dc65e.firebasestorage.app",
  messagingSenderId: "687763805360",
  appId: "1:687763805360:web:b914603af7c1057ce69775"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* AUTO REDIRECT JIKA SUDAH LOGIN */
if (localStorage.getItem("employee_nik")) {
  window.location.href = "employee-complaint.html";
}

/* LOGIN DENGAN TOMBOL ENTER */
document.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    loginEmployee();
  }
});

window.loginEmployee = async function () {
  const nik = document.getElementById("nik").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!nik || !password) {
    alert("NIK dan Password wajib diisi");
    return;
  }

  try {
    const snapshot = await getDocs(collection(db, "karyawan"));
    let loginBerhasil = false;

    snapshot.forEach((doc) => {
      const data = doc.data();

      if (
        data.nik === nik &&
        data.tgl_lahir === password &&
        data.role === "staff"
      ) {
        loginBerhasil = true;

        localStorage.setItem("employee_nik", data.nik || "");
        localStorage.setItem("employee_nama", data.nama || "");
        localStorage.setItem("employee_jabatan", data.jabatan || "");
        localStorage.setItem("employee_departemen", data.departemen || "");
        localStorage.setItem("employee_role", data.role || "");

        window.location.href = "employee-complaint.html";
      }
    });

    if (!loginBerhasil) {
      alert("Login gagal. Periksa NIK dan Password");
    }

  } catch (error) {
    console.error("Login Error:", error);
    alert("Terjadi kesalahan saat login");
  }
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Close Premium Final</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      padding: 30px;
      color: #1e293b;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input, select, textarea {
      padding: 12px;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      font-size: 14px;
      width: 100%;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .full {
      margin-top: 20px;
    }

    .actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .save {
      background: #2563eb;
      color: white;
    }

    .close-case {
      background: #16a34a;
      color: white;
    }

    .reopen {
      background: #dc2626;
      color: white;
    }

    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .container {
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Case Close Premium Final</h1>
    <p class="subtitle">Finalisasi penyelesaian keluhan karyawan dan approval penutupan kasus</p>

   <div class="form-group">
  <label>Complaint ID</label>
  <input type="text" id="complaintId" placeholder="Auto from complaint">
</div>

<div class="form-group">
  <label>Resolution Note</label>
  <textarea id="resolutionNote" placeholder="Tuliskan penyelesaian masalah..."></textarea>
</div>

<div class="form-group">
  <label>Closed By (HR PIC)</label>
  <input type="text" id="closedBy" placeholder="Nama HR yang menangani">
</div>

<div class="form-group">
  <label>Closed Date</label>
  <input type="date" id="closedDate">
</div>

<div class="form-group">
  <label>Final Status</label>
  <select id="finalStatus">
    <option value="Closed">Closed</option>
  </select>
</div>

<button class="btn btn-submit" onclick="closeCase()">
  Submit Case Close
</button>
     
    </div>
  </div>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    doc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCy9-XeYCtRIizGgReyiFmfEY6wj7kbKl4",
    authDomain: "hr-complaint-system-dc65e.firebaseapp.com",
    projectId: "hr-complaint-system-dc65e",
    storageBucket: "hr-complaint-system-dc65e.firebasestorage.app",
    messagingSenderId: "687763805360",
    appId: "1:687763805360:web:b914603af7c1057ce69775"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const complaintIdFromURL = params.get("id");

if (complaintIdFromURL) {
  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("complaintId").value = complaintIdFromURL;
  });
}

  window.closeCase = async function () {
    const complaintId = document.getElementById("complaintId").value;
    const resolutionNote = document.getElementById("resolutionNote").value;
    const closedBy = document.getElementById("closedBy").value;
    const closedDate = document.getElementById("closedDate").value;
    const finalStatus = document.getElementById("finalStatus").value;

    if (!complaintId) {
      alert("Complaint ID wajib diisi");
      return;
    }

    try {
      const docRef = doc(db, "complaints", complaintId);

      await updateDoc(docRef, {
        status: finalStatus,
        resolutionNote: resolutionNote,
        closedBy: closedBy,
        closedDate: closedDate
      });

      alert("Case berhasil ditutup!");
    } catch (error) {
      alert("Gagal menutup case");
      console.error(error);
    }
  };
</script>
</body>
</html>

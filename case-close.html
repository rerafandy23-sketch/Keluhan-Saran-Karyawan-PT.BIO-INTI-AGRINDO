<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Close Premium Final</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      padding: 30px;
      color: #1e293b;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input, select, textarea {
      padding: 12px;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      font-size: 14px;
      width: 100%;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .full {
      margin-top: 20px;
    }

    .actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .save {
      background: #2563eb;
      color: white;
    }

    .close-case {
      background: #16a34a;
      color: white;
    }

    .reopen {
      background: #dc2626;
      color: white;
    }

    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .container {
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Case Close Premium Final</h1>
    <p class="subtitle">Finalisasi penyelesaian keluhan karyawan dan approval penutupan kasus</p>

    <div class="grid">
      <div class="form-group">
        <label>ID Kasus</label>
        <input type="text" placeholder="Contoh: CC-001">
      </div>

      <div class="form-group">
        <label>Nama Karyawan</label>
        <input type="text" placeholder="Nama lengkap">
      </div>

      <div class="form-group">
        <label>Departemen</label>
        <input type="text" placeholder="Departemen">
      </div>

      <div class="form-group">
        <label>PIC Penanganan</label>
        <input type="text" placeholder="Nama PIC HR">
      </div>

      <div class="form-group">
        <label>Status Investigasi</label>
        <select>
          <option>Open</option>
          <option>In Progress</option>
          <option>Resolved</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status Final</label>
        <select>
          <option>Closed</option>
          <option>Reopen</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tanggal Penyelesaian</label>
        <input type="date">
      </div>

      <div class="form-group">
        <label>Approval HR Manager</label>
        <select>
          <option>Pending</option>
          <option>Approved</option>
          <option>Rejected</option>
        </select>
      </div>
    </div>

    <div class="full form-group">
      <label>Solusi yang Diberikan</label>
      <textarea placeholder="Tuliskan solusi final..."></textarea>
    </div>

    <div class="full form-group">
      <label>Catatan Penutupan Kasus</label>
      <textarea placeholder="Catatan tambahan..."></textarea>
    </div>

    <div class="full form-group">
      <label>Feedback Karyawan</label>
      <textarea placeholder="Masukan dari karyawan..."></textarea>
    </div>

    <div class="full form-group">
      <label>Alasan Reopen (Jika Ada)</label>
      <textarea placeholder="Isi jika kasus dibuka kembali..."></textarea>
    </div>

    <div class="actions">
      <button class="save">Simpan Draft</button>
      <button class="close-case">Close Case</button>
      <button class="reopen">Reopen Case</button>
    </div>
  </div>
</body>
</html>

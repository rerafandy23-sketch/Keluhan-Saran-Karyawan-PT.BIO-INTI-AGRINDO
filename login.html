<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIACARE HR SYSTEM - Login</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      width: 350px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2e7d32;
    }
.logo-box {
  text-align: center;
  margin-bottom: 25px;
}

.logo {
  width: 140px;
  height: auto;
  margin-bottom: 15px;
}

.logo-box h2 {
  color: #0E4D2B;
  margin-bottom: 8px;
  font-size: 28px;
}

.logo-box p {
  font-weight: bold;
  color: #2e7d32;
  margin-bottom: 5px;
}

.logo-box small {
  color: #666;
  font-size: 13px;
}
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }

    #success {
      color: green;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo-box">
  <img src="logo.png" alt="BIACARE HR SYSTEM" class="logo">
  <h2>BIACARE HR SYSTEM</h2>
  <p>PT. BIO INTI AGRINDO</p>
  <small>Empowering People, Building a Better Future</small>
</div>

  <form id="loginForm">
    <input type="text" id="nik" placeholder="Masukkan NIK" required>
    <input type="date" id="dob" required>

    <button type="submit">Login</button>

    <p id="error"></p>
    <p id="success"></p>
  </form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy9-XeYCtRIizGgReyiFmfEY6wj7kbKl4",
  authDomain: "hr-complaint-system-dc65e.firebaseapp.com",
  projectId: "hr-complaint-system-dc65e",
  storageBucket: "hr-complaint-system-dc65e.firebasestorage.app",
  messagingSenderId: "687763805360",
  appId: "1:687763805360:web:b914603af7c1057ce69775"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const nikInput = document.getElementById("nik").value.trim();
  const dobInput = document.getElementById("dob").value;

  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.textContent = "";
  success.textContent = "";

  // ubah format YYYY-MM-DD → DD/MM/YYYY
  const parts = dobInput.split("-");
  const dobFormatted = `${parts[2]}/${parts[1]}/${parts[0]}`;

  try {
    const querySnapshot = await getDocs(collection(db, "karyawan"));

    let foundUser = null;

    querySnapshot.forEach((doc) => {
      const user = doc.data();

      if (
        user.nik === nikInput &&
        user.tgl_lahir === dobFormatted
      ) {
        foundUser = user;
      }
    });

    if (foundUser) {
  localStorage.setItem("user", JSON.stringify(foundUser));

  success.textContent = "Login berhasil...";

  setTimeout(() => {

    // Auto Redirect berdasarkan role
    if (
      foundUser.role &&
      foundUser.role.toLowerCase() === "hr"
    ) {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  }, 1000);

} else {
  error.textContent = "NIK atau tanggal lahir salah";
}

  } catch (err) {
    console.log(err);
    error.textContent = "Gagal koneksi ke Firestore";
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Karyawan</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      width: 350px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }

    #success {
      color: green;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login Karyawan</h2>

  <form id="loginForm">
    <input type="text" id="nik" placeholder="Masukkan NIK" required>
    <input type="date" id="dob" required>

    <button type="submit">Login</button>

    <p id="error"></p>
    <p id="success"></p>
  </form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfxTY0SNtQJBAz7yu8f_BDhZ3w_O244eE",
  authDomain: "keluahan-karyawan--ptbia.firebaseapp.com",
  projectId: "keluahan-karyawan--ptbia",
  storageBucket: "keluahan-karyawan--ptbia.firebasestorage.app",
  messagingSenderId: "855781665617",
  appId: "1:855781665617:web:c7a6a34bd1e2eca0ef0170"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const nikInput = document.getElementById("nik").value.trim();
  const dobInput = document.getElementById("dob").value;

  const error = document.getElementById("error");
  const success = document.getElementById("success");

  error.textContent = "";
  success.textContent = "";

  // ubah format YYYY-MM-DD → DD/MM/YYYY
  const parts = dobInput.split("-");
  const dobFormatted = `${parts[2]}/${parts[1]}/${parts[0]}`;

  try {
    const querySnapshot = await getDocs(collection(db, "karyawan"));

    let foundUser = null;

    querySnapshot.forEach((doc) => {
      const user = doc.data();

      if (
        user.nik === nikInput &&
        user.tgl_lahir === dobFormatted
      ) {
        foundUser = user;
      }
    });

    if (foundUser) {
      localStorage.setItem("user", JSON.stringify(foundUser));

      success.textContent = "Login berhasil...";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);

    } else {
      error.textContent = "NIK atau tanggal lahir salah";
    }

  } catch (err) {
    console.log(err);
    error.textContent = "Gagal koneksi ke Firestore";
  }
});

</script>

</body>
</html>
